# Deploy to VPS: upload via rsync (root + password), then build and restart PM2 over SSH
# Port 22 must be open on the VPS for GitHub Actions IPs (or 0.0.0.0/0).

name: Deploy to VPS

on:
  push:
    branches: [master, main]
  workflow_dispatch:

env:
  DEPLOY_PATH: "/var/www/gemify"
  PM2_APP: "gemify"
  VPS_HOST: "76.13.42.156"
  VPS_USER: "root"
  VPS_PASSWORD: "?4-gOD'IX6ezugnthMBr"

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SSH and rsync
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y sshpass rsync

      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ env.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Upload and build on VPS
        env:
          VPS_PASSWORD: ${{ env.VPS_PASSWORD }}
        run: |
          sshpass -p "$VPS_PASSWORD" rsync -avz --delete \
            --exclude=node_modules \
            --exclude=.next \
            --exclude=.git \
            --exclude=backups \
            --exclude=.env \
            --exclude=.env.local \
            -e "ssh -o StrictHostKeyChecking=no" \
            . ${{ env.VPS_USER }}@${{ env.VPS_HOST }}:${{ env.DEPLOY_PATH }}/

          sshpass -p "$VPS_PASSWORD" ssh -o StrictHostKeyChecking=no \
            ${{ env.VPS_USER }}@${{ env.VPS_HOST }} \
            "cd ${{ env.DEPLOY_PATH }} && npm install && npm run build && pm2 restart ${{ env.PM2_APP }}"
